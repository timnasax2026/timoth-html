<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIMNASA TMD1 | THE GOLD LEGEND</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #00f2ff; 
            --accent: #7000ff;
            --dark-bg: #050505; 
            --card-bg: rgba(15, 15, 21, 0.9);
            --text: #ffffff; 
        }
        
        body { 
            font-family: 'Poppins', sans-serif; 
            background: var(--dark-bg); 
            color: var(--text); 
            margin: 0; 
            padding: 0;
            overflow-x: hidden;
        }

        /* Video Background au Gradient */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #050505 100%);
            z-index: -1;
        }

        /* Music Player Styling */
        .music-player {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--card-bg);
            padding: 10px 20px;
            border-radius: 50px;
            border: 1px solid var(--primary);
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 1000;
            box-shadow: 0 0 15px var(--primary);
        }

        header { 
            text-align: center; 
            padding: 100px 20px; 
            background: linear-gradient(45deg, rgba(0,0,0,0.9), rgba(112,0,255,0.3));
            border-bottom: 3px solid var(--primary);
        }

        h1 { 
            font-family: 'Orbitron', sans-serif;
            color: var(--primary); 
            font-size: 3.5rem; 
            margin: 0; 
            text-shadow: 0 0 30px var(--primary);
            letter-spacing: 8px;
        }

        .container { max-width: 1200px; margin: auto; padding: 40px 20px; }

        .step-card { 
            background: var(--card-bg); 
            padding: 50px; 
            border-radius: 30px; 
            text-align: center; 
            margin-bottom: 50px; 
            border: 1px solid rgba(0, 242, 255, 0.3);
            backdrop-filter: blur(10px);
        }

        .btn-pair { 
            background: linear-gradient(90deg, var(--primary), var(--accent));
            color: #000; 
            padding: 22px 60px; 
            text-decoration: none; 
            border-radius: 50px; 
            font-weight: 800; 
            font-size: 1.5rem; 
            display: inline-block; 
            transition: 0.4s;
            box-shadow: 0 0 20px var(--primary);
        }

        .btn-pair:hover { transform: scale(1.1); box-shadow: 0 0 50px var(--accent); color: #fff; }

        .deploy-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); 
            gap: 25px; 
        }

        .deploy-card { 
            background: var(--card-bg); 
            padding: 30px; 
            border-radius: 20px; 
            text-align: center; 
            border: 1px solid #333; 
            transition: 0.4s;
        }

        .deploy-card:hover { 
            border-color: var(--primary);
            transform: translateY(-10px);
            background: rgba(112,0,255,0.1);
        }

        .btn-deploy { 
            color: var(--primary); 
            text-decoration: none; 
            border: 1px solid var(--primary); 
            padding: 10px 25px; 
            border-radius: 8px; 
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-deploy:hover { background: var(--primary); color: #000; }

        footer { text-align: center; padding: 60px; color: #888; border-top: 1px solid #222; }

        /* Animation for Glowing */
        @keyframes glow {
            0% { text-shadow: 0 0 10px var(--primary); }
            50% { text-shadow: 0 0 30px var(--primary), 0 0 40px var(--accent); }
            100% { text-shadow: 0 0 10px var(--primary); }
        }
        .glow { animation: glow 2s infinite; }
    </style>
</head>
<body>

<div class="music-player">
    <span style="font-size: 0.8rem; color: var(--primary);">Legend Audio:</span>
    <audio id="bgMusic" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-15.mp3" type="audio/mpeg">
    </audio>
    <button onclick="toggleMusic()" id="musicBtn" style="background: none; border: none; color: var(--primary); cursor: pointer; font-size: 1.2rem;">▶️ Play</button>
</div>

<header>
    <h1 class="glow">TIMNASA TMD1</h1>
    <p style="letter-spacing: 3px;">THE GOLDEN ERA OF WHATSAPP BOTS</p>
</header>

<div class="container">
    <div class="step-card">
        <h2 style="color: var(--primary); font-family: 'Orbitron';">STEP 1: SECURE SESSION</h2>
        <p>Connect your number to the mainframe to generate your Session ID.</p>
        <br>
        <a href="https://timoth-timnasa.onrender.com/pair" target="_blank" class="btn-pair">START PAIRING ⚡</a>
    </div>

    <h2 style="text-align: center; font-family: 'Orbitron'; color: var(--primary); margin-bottom: 40px;">STEP 2: MULTI-SERVER DEPLOYMENT (25)</h2>
    
    <div class="deploy-grid">
        <script>
            const platforms = [
                "Render", "Koyeb", "Railway", "Heroku", "Replit", 
                "Fly.io", "Vercel", "Netlify", "Google Cloud", "AWS", 
                "Oracle Cloud", "DigitalOcean", "Azure", "Hugging Face", "GitHub",
                "Scaleway", "Linode", "Vultr", "Cyclic", "Glitch",
                "Deta", "Stackblitz", "Gitpod", "Surge", "Firebase"
            ];
            
            const links = [
                "https://dashboard.render.com", "https://app.koyeb.com", "https://railway.app", "https://dashboard.heroku.com", "https://replit.com",
                "https://fly.io", "https://vercel.com", "https://netlify.com", "https://cloud.google.com", "https://aws.amazon.com",
                "https://oracle.com", "https://digitalocean.com", "https://azure.com", "https://huggingface.co", "https://github.com/codespaces",
                "https://www.scaleway.com", "https://www.linode.com", "https://www.vultr.com", "https://www.cyclic.sh", "https://glitch.com",
                "https://deta.space", "https://stackblitz.com", "https://gitpod.io", "https://surge.sh", "https://firebase.google.com"
            ];

            for(let i=0; i < platforms.length; i++) {
                document.write(`
                    <div class="deploy-card">
                        <h3 style="font-family: Orbitron;">${platforms[i]}</h3>
                        <p style="font-size:0.75rem; color:#aaa; margin-bottom:20px;">Deploy TIMNASA_TMD1</p>
                        <a href="${links[i]}" class="btn-deploy" target="_blank">DEPLOY</a>
                    </div>
                `);
            }
        </script>
    </div>
</div>

<footer>
    <p>TIMNASA TMD1 &copy; 2026 | POWERED BY NEXT5X TECH</p>
    <p><a href="https://github.com/Next5x/TIMNASA_TMD1" style="color:var(--primary); text-decoration:none;">GET SOURCE CODE</a></p>
</footer>

<script>
    const music = document.getElementById("bgMusic");
    const btn = document.getElementById("musicBtn");

    function toggleMusic() {
        if (music.paused) {
            music.play();
            btn.innerHTML = "⏸️ Pause";
        } else {
            music.pause();
            btn.innerHTML = "▶️ Play";
        }
    }
</script>

</body>
</html>
